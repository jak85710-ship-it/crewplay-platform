# 若 Netlify 將 Base directory 設為 crewplay-platform，使用此檔
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Primary domain 請設為 www.crewplay.tw（Netlify 後台），裸網域由 Netlify 轉到 www

[[redirects]]
  from = "http://www.crewplay.tw/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true
