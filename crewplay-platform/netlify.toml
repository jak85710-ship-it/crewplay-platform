# 若 Netlify 將 Base directory 設為 crewplay-platform，使用此檔
[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "https://crewplay.tw/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://crewplay.tw/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.crewplay.tw/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true
