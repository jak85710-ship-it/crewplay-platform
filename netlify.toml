# CrewPlay 正式站 → www.crewplay.tw
# Netlify：Repository 根目錄建置，實際 app 在 crewplay-platform/

[build]
  base = "crewplay-platform"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 裸網域 → www 由 Netlify「Primary domain = www.crewplay.tw」處理，勿在此重複轉址（會造成迴圈）

[[redirects]]
  from = "http://www.crewplay.tw/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

# crew-play.com → 正式站
[[redirects]]
  from = "https://crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.crew-play.com/*"
  to = "https://www.crewplay.tw/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
